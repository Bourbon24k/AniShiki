<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241522"/>
      <stop offset="1" stop-color="#120c12"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5c83"/>
      <stop offset="1" stop-color="#cc2e56"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#cc2e56" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#cc2e56" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- фон -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#glow)"/>

  <!-- ахоге (хвостик волос) -->
  <path d="M32 13 q4 -6 8.5 -3 q-4 0.5 -3 5"
        fill="none" stroke="url(#hair)" stroke-width="2.4" stroke-linecap="round"/>

  <!-- волосы (силуэт головы) -->
  <path d="M32 13
           C 18 13, 12 24, 12 36
           C 12 46, 18 52, 24 53
           L 24 40
           C 24 33, 27 31, 32 31
           C 37 31, 40 33, 40 40
           L 40 53
           C 46 52, 52 46, 52 36
           C 52 24, 46 13, 32 13 Z"
        fill="url(#hair)"/>

  <!-- лицо -->
  <path d="M22 33
           C 22 28, 26 26, 32 26
           C 38 26, 42 28, 42 33
           L 42 41
           C 42 48, 37 51, 32 51
           C 27 51, 22 48, 22 41 Z"
        fill="#ffe7d6"/>

  <!-- чёлка -->
  <path d="M21 34
           Q 24 26 27 33
           Q 29.5 25 32 33
           Q 34.5 25 37 33
           Q 40 26 43 34
           L 43 30
           Q 32 22 21 30 Z"
        fill="url(#hair)"/>

  <!-- румянец -->
  <ellipse cx="25" cy="43" rx="2.6" ry="1.5" fill="#ff7a9c" opacity="0.55"/>
  <ellipse cx="39" cy="43" rx="2.6" ry="1.5" fill="#ff7a9c" opacity="0.55"/>

  <!-- глаза -->
  <g>
    <ellipse cx="26.5" cy="39" rx="3.4" ry="4.4" fill="#fff"/>
    <ellipse cx="26.5" cy="39.6" rx="2.7" ry="3.5" fill="#cc2e56"/>
    <circle cx="25.4" cy="37.8" r="1.15" fill="#fff"/>
  </g>
  <g>
    <ellipse cx="37.5" cy="39" rx="3.4" ry="4.4" fill="#fff"/>
    <ellipse cx="37.5" cy="39.6" rx="2.7" ry="3.5" fill="#cc2e56"/>
    <circle cx="36.4" cy="37.8" r="1.15" fill="#fff"/>
  </g>

  <!-- ротик -->
  <path d="M30.4 46 Q 32 47.8 33.6 46" fill="none" stroke="#c98b76" stroke-width="1.3" stroke-linecap="round"/>
</svg>
